<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول | جيّة</title>
    <link rel="stylesheet" href="/shared/gaiah-ui.css" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card card">
        <a class="back-link" href="/">العودة للصفحة الرئيسية</a>
        <a class="brand-link" href="/">جيّة</a>
        <div class="auth-heading">
          <h1>تسجيل الدخول</h1>
          <p>ادخل إلى لوحة التحكم لمتابعة طلباتك واشتراكاتك.</p>
        </div>

        <div id="loginAlert" class="alert alert-info hidden"></div>

        <form id="loginForm" class="auth-form">
          <label>
            <span>البريد الإلكتروني</span>
            <input id="loginEmail" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>كلمة المرور</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="btn btn-gradient submit-button" type="submit">تسجيل الدخول</button>
        </form>

        <div class="auth-links">
          <a href="/register/index.html">ليس لديك حساب؟ إنشاء حساب جديد</a>
          <a href="/">اختيار باقة</a>
        </div>
      </section>
    </main>

    <script type="module" src="./login.js"></script>
  </body>
</html>
